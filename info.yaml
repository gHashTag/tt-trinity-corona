# tt-trinity-corona / info.yaml
# TinyTapeout chip metadata for TRI-1 Corona -- Format Conformance Oracle.

project:
  title:        "TRI-1 Corona -- Format Conformance Oracle"
  author:       "gHashTag / TRINITY (admin@t27.ai)"
  discord:      ""
  description:  "Read-only conformance oracle for 77 numeric formats. ROM stores the full SSOT catalog from gHashTag/t27 (PR #1028); ~12-15 Tier-1 RTL converters handle encode/decode for formats not owned by Gamma. D2D routes Gamma-owned formats to the Gamma die."
  language:     "Verilog"
  clock_hz:     50000000
  tiles:        "4x4"

  # Shuttle: ttgf26a (GlobalFoundries GF180MCU 180nm, open Apache-2.0 PDK)

  top_module:   "tt_um_trinity_corona"

  source_files:
    - "tt_um_trinity_corona.v"
    - "format_rom.v"

# -----------------------------------------------------------------------------
# Pin assignments
# -----------------------------------------------------------------------------
# ui_in[7:6]  = mode (00=CMD, 01=DATA_IN, 10=STATUS, 11=reserved)
# ui_in[6:0]  = fmt_id (0..76, 0x7F = anchor probe)   -- valid only when mode=CMD
# ui_in[7:0]  = data byte                              -- valid only when mode=DATA_IN
# uo_out[7:0] = result stream (record bytes / decoded value bytes)
# uio[3:0]    = D2D TX to Gamma (when D2D active)
# uio[7:4]    = D2D RX from Gamma (when D2D active)
# -----------------------------------------------------------------------------
pinout:
  ui[0]:    "mode_lsb_or_fmt_id_b0"
  ui[1]:    "fmt_id_b1"
  ui[2]:    "fmt_id_b2"
  ui[3]:    "fmt_id_b3"
  ui[4]:    "fmt_id_b4"
  ui[5]:    "fmt_id_b5"
  ui[6]:    "fmt_id_b6"
  ui[7]:    "mode_msb"
  uo[0]:    "result_b0"
  uo[1]:    "result_b1"
  uo[2]:    "result_b2"
  uo[3]:    "result_b3"
  uo[4]:    "result_b4"
  uo[5]:    "result_b5"
  uo[6]:    "result_b6"
  uo[7]:    "result_b7"
  uio[0]:   "d2d_tx_0"
  uio[1]:   "d2d_tx_1"
  uio[2]:   "d2d_tx_2"
  uio[3]:   "d2d_tx_3"
  uio[4]:   "d2d_rx_0"
  uio[5]:   "d2d_rx_1"
  uio[6]:   "d2d_rx_2"
  uio[7]:   "d2d_rx_3"

# Do not change!
yaml_version: 6
