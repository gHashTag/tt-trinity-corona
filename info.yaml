    - "rtl/bf16_decode.v"
    - "rtl/mxfp8_e4m3_decode.v"
    - "rtl/bcd_decode.v"
    - "rtl/lns8_decode.v"
    - "rtl/posit8_decode.v"
    - "rtl/fp4_decode.v"
    - "rtl/fp6_e3m2_decode.v"
    - "rtl/nf4_decode.v"
    - "rtl/tf32_decode.v"
    - "rtl/fp8_e5m2_decode.v"
    - "rtl/fp6_e2m3_decode.v"
    - "rtl/int8_decode.v"
    - "rtl/e8m0_decode.v"
    - "rtl/mxint8_decode.v"
    - "rtl/fp8_e4m3_fnuz_decode.v"
    - "rtl/bitnet_decode.v"
    - "rtl/int4_decode.v"

# -----------------------------------------------------------------------------
# Pin assignments
# -----------------------------------------------------------------------------
# Protocol v2: CMD1 (ui_in[7]=0, ui_in[6:0]=fmt_id), CMD2 (byte_count), raw DATA
# ui_in[7]    = 0 for CMD1 cycle, any value during DATA cycles
# ui_in[6:0]  = fmt_id (0..79, 0x7F = anchor probe) on CMD1 cycle
# uo_out[7:0] = result stream (record bytes / decoded value bytes)
# uio[7:0]    = anchor high byte (0x47) during the anchor probe (uio_oe=0xFF);
#              inactive inputs otherwise. D2D (uio[3:0] TX / uio[7:4] RX to Gamma)
#              is DEFERRED this shuttle -- see docs/adr/0006; no D2D RTL present.
# -----------------------------------------------------------------------------
pinout:
  ui[0]:    "mode_lsb_or_fmt_id_b0"
  ui[1]:    "fmt_id_b1"
  ui[2]:    "fmt_id_b2"
  ui[3]:    "fmt_id_b3"
  ui[4]:    "fmt_id_b4"
  ui[5]:    "fmt_id_b5"
  ui[6]:    "fmt_id_b6"
  ui[7]:    "mode_msb"
  uo[0]:    "result_b0"
  uo[1]:    "result_b1"
  uo[2]:    "result_b2"
  uo[3]:    "result_b3"
  uo[4]:    "result_b4"
  uo[5]:    "result_b5"
  uo[6]:    "result_b6"
  uo[7]:    "result_b7"
  uio[0]:   "anchor_hi_b0 (d2d_tx_0 future)"
  uio[1]:   "anchor_hi_b1 (d2d_tx_1 future)"
  uio[2]:   "anchor_hi_b2 (d2d_tx_2 future)"
  uio[3]:   "anchor_hi_b3 (d2d_tx_3 future)"
  uio[4]:   "anchor_hi_b4 (d2d_rx_0 future)"
  uio[5]:   "anchor_hi_b5 (d2d_rx_1 future)"
  uio[6]:   "anchor_hi_b6 (d2d_rx_2 future)"
  uio[7]:   "anchor_hi_b7 (d2d_rx_3 future)"

# Do not change!
yaml_version: 6
