name: GDS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gds:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Harden GDS (GF180MCU)
        uses: TinyTapeout/tt-gds-action@ttgf26a
        with:
          pdk: gf180mcuD

      - name: Upload GDS artifact
        uses: actions/upload-artifact@v4
        with:
          name: gds-files
          path: runs/

      - name: Print warnings
        if: always()
        run: ./tt/tt_tool.py --gf --print-warnings || true

  precheck:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - uses: TinyTapeout/tt-gds-action/precheck@ttgf26a

  gl_test:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: TinyTapeout/tt-gds-action/gl_test@ttgf26a

  viewer:
    needs: gds
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-24.04
    steps:
      - uses: TinyTapeout/tt-gds-action/viewer@ttgf26a
