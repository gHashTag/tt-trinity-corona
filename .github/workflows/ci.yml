# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Validate info.yaml
        run: |
          python3 << 'SCRIPT'
          import yaml, os, sys
          d = yaml.safe_load(open('info.yaml'))
          assert 'project' in d, 'missing project section'
          listed = set(d['project']['source_files'])
          actual = set('rtl/' + f for f in os.listdir('src/rtl') if f.endswith('.v'))
          missing = actual - listed
          extra = listed - actual
          ok = True
          if missing:
              print(f"ERROR: files in src/rtl/ not listed in info.yaml: {missing}")
              ok = False
          if extra:
              print(f"ERROR: info.yaml lists files not in src/rtl/: {extra}")
              ok = False
          if ok:
              print(f"info.yaml: {len(listed)} source files verified")
          sys.exit(0 if ok else 1)
          SCRIPT
      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog
      - name: Verilog lint
        run: make lint
      - name: ROM spec cross-check (23 formats vs published specs)
        run: python3 test/test_rom_spec_crosscheck.py
      - name: SSOT<->codegen layout cross-check (gen_rom.py vs .t27)
        run: python3 test/test_ssot_layout_crosscheck.py
      - name: ROM freshness + GLS-golden vs generator (no stale format_rom.v)
        run: python3 test/test_rom_emitted_golden.py
      - name: On-die coverage cross-check (ROM<->mux<->tests)
        run: python3 test/test_ondie_coverage_crosscheck.py
      - name: Anchor derivation + constant consistency (Lucas L_2, 0x47C0)
        run: python3 test/test_anchor_derivation.py
      - name: fmt_id consistency (all FMT_ consts vs RTL localparams)
        run: python3 test/test_fmt_id_consistency.py
      - name: LUT published values (NF4 vs QLoRA, FP4 vs OCP E2M1)
        run: python3 test/test_lut_published_values.py
      - name: Posit8 RTL vs independent reference (iverilog sweep)
        run: python3 test/test_posit8_independent.py
      - name: LNS8 RTL vs independent antilog reference (iverilog sweep)
        run: python3 test/test_lns8_independent.py
      - name: Simple decoders vs closed-form refs (int/bcd/bitnet/e8m0/mxint8)
        run: python3 test/test_simple_decoders_independent.py
      - name: Float decoders vs independent refs (bf16/tf32/fp8/fp6, iverilog)
        run: python3 test/test_float_decoders_independent.py
      - name: Independent-oracle coverage gate (every decoder has an external ref)
        run: python3 test/test_independent_oracle_coverage.py
      - name: Post-silicon bring-up vectors vs verified model
        run: python3 test/test_post_silicon_vectors.py

  claim-status-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Check claim-status tags
        run: |
          python3 << 'SCRIPT'
          import re, glob, sys

          BANNED = re.compile(
              r'\b(breakthrough|nobel|revolution|proves|first-ever|world-first|industry-leading|prize)\b',
              re.IGNORECASE,
          )
          errors = 0
          for pattern in ["**/*.v", "**/*.py", "**/*.md", "**/*.t27"]:
              for path in glob.glob(pattern, recursive=True):
                  if ".git/" in path or "node_modules/" in path:
                      continue
                  if "docs/REPORT_" in path or path == "docs/CLAIM_STATUS.md":
                      continue
                  with open(path, errors="replace") as f:
                      for i, line in enumerate(f, 1):
                          m = BANNED.search(line)
                          if m:
                              print(f"::error file={path},line={i}::banned word '{m.group()}' in: {line.rstrip()}")
                              errors += 1
          if errors:
              print(f"\n{errors} banned-word violation(s) found.")
              sys.exit(1)
          else:
              print("claim-status-lint: PASS (no banned words found)")
          SCRIPT

  verilator-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator
      - name: Verilator lint (zero warnings)
        run: verilator --lint-only -Wall -Isrc/rtl src/rtl/*.v

  formal:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container: hdlc/formal:min
    steps:
      - uses: actions/checkout@v6
      - name: Run SymbiYosys formal proofs (18 decoders + FSM + ROM)
        working-directory: formal
        run: make all SBY=sby

  gls:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install Yosys + Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y yosys iverilog
      - name: Synthesize to generic cells
        run: |
          yosys -p "read_verilog src/rtl/*.v; synth -top tt_um_trinity_corona -flatten; stat; write_verilog -noattr /tmp/corona_synth.v" 2>&1 | tee synth.log
          grep "Number of cells" synth.log
      - name: Gate-level simulation smoke test (76 tests)
        run: |
          SIMCELLS=$(yosys-config --datdir 2>/dev/null || echo /usr/share/yosys)/simcells.v
          iverilog -o /tmp/corona_gls "$SIMCELLS" /tmp/corona_synth.v test/tb_gls_smoke.v
          vvp /tmp/corona_gls 2>&1 | tee gls.log
          grep -q "ALL PASS" gls.log
      - name: ROM golden validation (80 records)
        run: |
          SIMCELLS=$(yosys-config --datdir 2>/dev/null || echo /usr/share/yosys)/simcells.v
          iverilog -o /tmp/rom_golden "$SIMCELLS" /tmp/corona_synth.v test/tb_rom_golden.v
          vvp /tmp/rom_golden 2>&1 | tee rom_golden.log
          grep -q "ALL 80 RECORDS PASS" rom_golden.log


  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog
      - name: Install cocotb
        run: pip install cocotb==2.0.1
      - name: Run cocotb tests
        working-directory: test
        run: make SIM=icarus TOPLEVEL_LANG=verilog
